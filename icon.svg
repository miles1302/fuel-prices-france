<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#grad1)"/>
  
  <!-- Gas pump icon -->
  <g fill="white">
    <!-- Pump body -->
    <rect x="150" y="180" width="140" height="200" rx="10" ry="10"/>
    
    <!-- Pump screen -->
    <rect x="170" y="210" width="100" height="80" rx="5" ry="5" fill="#667eea"/>
    
    <!-- Pump nozzle holder -->
    <rect x="310" y="220" width="60" height="40" rx="5" ry="5"/>
    <path d="M 370 240 L 390 230 L 390 250 Z" fill="white"/>
    
    <!-- Pump hose -->
    <path d="M 290 250 Q 320 250 340 240" stroke="white" stroke-width="8" fill="none" stroke-linecap="round"/>
    
    <!-- Pump base -->
    <rect x="130" y="380" width="180" height="30" rx="5" ry="5"/>
    
    <!-- Price display "€" -->
    <text x="220" y="260" font-size="45" font-weight="bold" fill="white" text-anchor="middle">€</text>
    
    <!-- Decorative lines on pump -->
    <line x1="160" y1="320" x2="280" y2="320" stroke="#667eea" stroke-width="4"/>
    <line x1="160" y1="340" x2="280" y2="340" stroke="#667eea" stroke-width="4"/>
    <line x1="160" y1="360" x2="280" y2="360" stroke="#667eea" stroke-width="4"/>
  </g>
  
  <!-- Chart icon overlay (showing "top 10" concept) -->
  <g transform="translate(340, 340)">
    <rect x="0" y="40" width="30" height="60" rx="3" fill="#FFD700" opacity="0.9"/>
    <rect x="40" y="20" width="30" height="80" rx="3" fill="#C0C0C0" opacity="0.9"/>
    <rect x="80" y="50" width="30" height="50" rx="3" fill="#CD7F32" opacity="0.9"/>
  </g>
</svg>
